<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="player-section">
            <div class="now-playing">
                <img id="cover-image" src="https://via.placeholder.com/300" alt="Album Cover">
                <h2 id="song-title">Select a song</h2>
                <h3 id="song-artist">Artist</h3>
            </div>
            
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" min="0" max="100" value="0">
                <span id="duration">0:00</span>
            </div>

            <div class="controls">
                <button id="prev-btn"><i class="fas fa-backward-step"></i></button>
                <button id="play-btn"><i class="fas fa-play"></i></button>
                <button id="next-btn"><i class="fas fa-forward-step"></i></button>
            </div>

            <div class="volume-container">
                <i class="fas fa-volume-low"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                <i class="fas fa-volume-high"></i>
            </div>
            
            <audio id="audio-player"></audio>
        </div>

        <div class="playlist-section">
            <h2>Playlist</h2>
            <div id="loading-spinner" class="hidden">
                <i class="fas fa-spinner fa-spin"></i> Loading...
            </div>
            <div id="error-message" class="hidden"></div>
            <ul id="playlist"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
